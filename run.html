<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Contratto di Don Bosco - Challenge</title>
    <style>
        :root {
            --primary: #c5a059; /* Oro Don Bosco */
            --secondary: #2c3e50;
            --danger: #e74c3c;
            --success: #27ae60;
            --dark: #0a0a0a;
            --light: #f2e6d0;
        }

        body {
            font-family: 'Crimson Pro', serif;
            background-color: var(--dark);
            background-image: radial-gradient(circle, #1a1a1a 0%, #050505 100%);
            color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #game-container {
            width: 90%;
            max-width: 600px;
            background: #151515;
            color: var(--light);
            padding: 2.5rem;
            border-radius: 4px;
            border: 1px solid var(--primary);
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
            text-align: center;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 2rem;
            background: rgba(197, 160, 89, 0.1);
            padding: 15px;
            border: 1px solid rgba(197, 160, 89, 0.3);
        }

        .stat-box { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { 
            display: block; 
            font-size: 1.5rem; 
            color: var(--primary);
            font-family: 'Cinzel', serif;
        }

        #scenario-text {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            min-height: 100px;
            line-height: 1.6;
            font-style: italic;
        }

        .btn-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            padding: 16px;
            border: 1px solid var(--primary);
            background: transparent;
            color: var(--primary);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            font-weight: bold;
        }

        button:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 15px var(--primary);
        }

        .progress-bar {
            font-size: 0.8rem;
            margin-top: 10px;
            color: #666;
        }

        .success-msg { color: var(--success); font-family: 'Cinzel'; }
        .fail-msg { color: var(--danger); }
    </style>
</head>
<body>

<div id="game-container">
    <div class="stats-container">
        <div class="stat-box">Competenza<span id="stat-tech" class="stat-value">50</span></div>
        <div class="stat-box">Onestà<span id="stat-honesty" class="stat-value">50</span></div>
        <div class="stat-box">Relazioni<span id="stat-rel" class="stat-value">50</span></div>
    </div>

    <div id="game-content">
        <p id="scenario-text">Il mastro ti osserva... dimostra di essere degno dell'officina.</p>
        <div class="btn-container" id="choices"></div>
        <div class="progress-bar" id="progress">Passo 1 di 6</div>
    </div>
</div>

<script>
    const scenarios = [
        {
            text: "Un compagno ha rotto un ingranaggio costoso per distrazione e ti prega di non dire nulla al mastro. Che fai?",
            choices: [
                { text: "Lo aiuti a ripararlo di nascosto facendo tardi", effects: { tech: 15, honesty: -5, rel: 10 } },
                { text: "Lo convinci ad ammettere l'errore e ti offri di aiutarlo", effects: { tech: 5, honesty: 15, rel: 15 } }
            ]
        },
        {
            text: "C'è un lavoro extra urgente, ma Don Bosco ha organizzato una sfida a 'lippa' in cortile.",
            choices: [
                { text: "Finisci il lavoro perfettamente (Il dovere prima!)", effects: { tech: 20, honesty: 10, rel: -10 } },
                { text: "Corri in cortile (L'allegria è la nostra santità)", effects: { tech: -10, honesty: 0, rel: 20 } }
            ]
        },
        {
            text: "Un cliente facoltoso ti offreuna mancia 'segreta' per passare avanti agli altri ordini.",
            choices: [
                { text: "Rifiuti con cortesia (Onestà non ha prezzo)", effects: { tech: 0, honesty: 25, rel: 5 } },
                { text: "Accetti (In fondo sono soldi per la tua famiglia)", effects: { tech: 0, honesty: -30, rel: -5 } }
            ]
        },
        {
            text: "Hai notato un metodo più veloce per forgiare, ma è meno preciso. Il mastro non se ne accorgerebbe.",
            choices: [
                { text: "Scegli la qualità (Lavora come se Dio ti vedesse)", effects: { tech: 15, honesty: 10, rel: 0 } },
                { text: "Scegli la velocità (Il tempo è denaro)", effects: { tech: -15, honesty: -10, rel: 5 } }
            ]
        },
        {
            text: "Un nuovo apprendista è in difficoltà e rallenta la linea. Tutti lo prendono in giro.",
            choices: [
                { text: "Ti fermi a spiegargli i segreti del mestiere", effects: { tech: 10, honesty: 5, rel: 20 } },
                { text: "Lavori il doppio per compensare senza parlare", effects: { tech: 15, honesty: 0, rel: -5 } }
            ]
        },
        {
            text: "È sera. Il mastro ti chiede se hai pulito perfettamente la tua postazione.",
            choices: [
                { text: "Dici la verità: 'Ho dimenticato un angolo, provvedo'", effects: { tech: 5, honesty: 20, rel: 5 } },
                { text: "Dici 'Sì' per andare subito a cena", effects: { tech: -10, honesty: -20, rel: 0 } }
            ]
        }
    ];

    let stats = { tech: 0, honesty: 0, rel: 0 };
    let currentStep = 0;
    const SOGLIA_MINIMA = 30; // Se una stat scende sotto 30, perdi.

    function updateDisplay() {
        // Aggiorniamo i valori numerici a video
        document.getElementById('stat-tech').innerText = stats.tech;
        document.getElementById('stat-honesty').innerText = stats.honesty;
        document.getElementById('stat-rel').innerText = stats.rel;
        document.getElementById('progress').innerText = `Scenari affrontati: ${currentStep} di ${scenarios.length}`;

        // Se abbiamo finito tutti gli scenari, facciamo il controllo finale
        if (currentStep >= scenarios.length) {
            checkFinalScore();
            return;
        }

        // Altrimenti mostriamo lo scenario corrente
        const scene = scenarios[currentStep];
        document.getElementById('scenario-text').innerText = scene.text;
        const btnContainer = document.getElementById('choices');
        btnContainer.innerHTML = '';

        scene.choices.forEach(choice => {
            const btn = document.createElement('button');
            btn.innerText = choice.text;
            btn.onclick = () => {
                stats.tech += choice.effects.tech;
                stats.honesty += choice.effects.honesty;
                stats.rel += choice.effects.rel;
                currentStep++;
                updateDisplay();
            };
            btnContainer.appendChild(btn);
        });
    }

    function checkFinalScore() {
        // Controllo: tutte le statistiche devono essere almeno 30
        const isBalanced = stats.tech >= SOGLIA_MINIMA && 
                           stats.honesty >= SOGLIA_MINIMA && 
                           stats.rel >= SOGLIA_MINIMA;

        if (isBalanced) {
            endGame("Hai superato la prova! Don Bosco sorride: 'Sei il tipo di giovane che cercavo'. Il contratto è firmato.", true);
        } else {
            // Messaggio personalizzato per far capire cosa è mancato
            let motivo = "Il mastro scuote il capo. ";
            if (stats.tech < SOGLIA_MINIMA) motivo += "Ti manca la perizia tecnica. ";
            if (stats.honesty < SOGLIA_MINIMA) motivo += "La tua integrità è vacillante. ";
            if (stats.rel < SOGLIA_MINIMA) motivo += "Non hai curato i rapporti con i compagni. ";
            
            endGame(motivo + "Un buon artigiano deve equilibrare testa, mani e cuore.", false);
        }
    }

    function endGame(message, isWin) {
        const container = document.getElementById('game-content');
        container.innerHTML = `
            <h2 class="${isWin ? 'success-msg' : 'fail-msg'}">${message}</h2>
            <div style="margin: 20px 0;">
                <p>Punteggio Finale:</p>
                <p>Mani (Tech): ${stats.tech} | Cuore (Rel): ${stats.rel} | Onestà: ${stats.honesty}</p>
            </div>
            ${isWin ? 
                `<button onclick="window.location.href='prossima_decade.html'">SBLOCCA DECADE SUCCESSIVA →</button>` : 
                `<button onclick="location.reload()">RICOMINCIA L'APPRENDISTATO</button>`}
        `;
    }

    updateDisplay();
</script>
</body>
</html>
