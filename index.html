<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IL CODICE DEL SOGNO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Crimson+Pro:ital,wght@0,400;1,600&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; background-color: #000; color: #f2e6d0; font-family: 'Crimson Pro', serif; }
        
        /* Sfondo forzato */
        #bg-live {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2; object-fit: cover; object-position: center top;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.8) 80%);
            z-index: -1;
        }

        .wrapper { max-width: 800px; margin: 0 auto; padding: 40px 20px; text-align: center; }
        .header { margin-bottom: 450px; }
        h1 { font-family: 'Cinzel'; color: #c5a059; font-size: 3rem; text-shadow: 2px 2px 10px #000; }
        
        .box { background: rgba(10, 10, 10, 0.9); border: 1px solid #c5a059; padding: 30px; margin-bottom: 30px; }
        
        /* Gioco */
        .pool { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px 0; min-height: 80px; }
        .item { background: #f2e6d0; color: #000; padding: 8px 12px; cursor: grab; font-weight: bold; border: 2px solid #c5a059; }
        .slots { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .target { width: 150px; height: 50px; border: 2px dashed #c5a059; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.05); }
        .btn { display: none; background: #c5a059; color: #000; padding: 15px 30px; font-family: 'Cinzel'; border: none; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <img id="bg-live" alt="Background">
    <div class="overlay"></div>

    <div class="wrapper">
        <div class="header">
            <h1>IL CODICE DEL SOGNO</h1>
            <p><i>"Dalla mia vita alla vostra"</i></p>
        </div>

        <div class="box">
            <p>Sblocca il primo sigillo trascinando i frammenti nell'ordine corretto.</p>
            <div class="pool" id="pool"></div>
            <div class="slots">
                <div class="target" data-id="1"></div>
                <div class="target" data-id="2"></div>
                <div class="target" data-id="3"></div>
                <div class="target" data-id="4"></div>
            </div>
            <div id="status"></div>
            <button id="next" class="btn" onclick="window.location.href='run.html'">SBLOCCA DECADE 1</button>
        </div>
    </div>

    <script>
        // FORZATURA IMMAGINE: Aggiungiamo un timestamp per saltare la cache
        const img = document.getElementById('bg-live');
        img.src = "https://leys7.github.io/DonBosco/donbosco.jpg?t=" + new Date().getTime();

        const data = [
            { id: "1", t: "Renditi umile," }, { id: "2", t: "forte e robusto:" },
            { id: "3", t: "trasformerai i lupi" }, { id: "4", t: "in agnelli." },
            { id: "x", t: "Cerca il potere" }, { id: "x", t: "Usa la forza" },
            { id: "x", t: "Sii orgoglioso" }, { id: "x", t: "Accumula beni" }
        ];

        const pool = document.getElementById('pool');
        const state = [null, null, null, null];

        data.sort(() => Math.random() - 0.5).forEach(d => {
            const el = document.createElement('div');
            el.className = 'item'; el.draggable = true; el.innerText = d.t; el.id = 'd' + Math.random();
            el.dataset.val = d.id;
            el.addEventListener('dragstart', e => e.dataTransfer.setData('text', e.target.id));
            pool.appendChild(el);
        });

        document.querySelectorAll('.target, .pool').forEach(zone => {
            zone.addEventListener('dragover', e => e.preventDefault());
            zone.addEventListener('drop', e => {
                e.preventDefault();
                const id = e.dataTransfer.getData('text');
                const el = document.getElementById(id);
                zone.appendChild(el);
                check();
            });
        });

        function check() {
            const results = Array.from(document.querySelectorAll('.target')).map(t => t.children[0]?.dataset.val);
            if (JSON.stringify(results) === JSON.stringify(["1", "2", "3", "4"])) {
                document.getElementById('next').style.display = 'inline-block';
                document.getElementById('status').innerText = "SIGILLO APERTO!";
            }
        }
    </script>
</body>
</html>
