<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IL CODICE DEL SOGNO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Crimson+Pro:ital,wght@0,400;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --parchment: #f2e6d0;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #050505;
            color: var(--parchment);
            font-family: 'Crimson Pro', serif;
            overflow-x: hidden;
        }

        /* SFONDO FISSO POSIZIONATO IN ALTO */
        #hero-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            z-index: -2;
            background-image: url('https://leys7.github.io/DonBosco/donbosco.jpg');
            background-size: contain; 
            background-position: center 10%; 
            background-repeat: no-repeat;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, 
                rgba(0,0,0,0) 0%, 
                rgba(0,0,0,0.3) 30%, 
                rgba(5,5,5,0.9) 70%, 
                #050505 100%);
            z-index: -1;
        }

        .wrapper {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 400px; /* Spazio vitale per vedere il volto */
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: clamp(2.5rem, 10vw, 4rem);
            text-shadow: 0 0 30px black;
            margin: 0;
        }

        /* BOX GIOCO AMPIO */
        .main-game-area {
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid var(--gold);
            padding: 40px;
            width: 100%;
            max-width: 900px;
            box-sizing: border-box;
            border-radius: 2px;
            box-shadow: 0 0 60px black;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        .pool {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin: 30px 0;
        }

        .fragment {
            background: var(--parchment);
            color: #1a120b;
            padding: 12px 18px;
            cursor: grab;
            font-weight: bold;
            border: 1px solid var(--gold);
            box-shadow: 4px 4px 0 rgba(197, 160, 89, 0.2);
            font-size: 1rem;
        }

        .slots {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .target {
            width: 200px; height: 70px;
            border: 2px dashed rgba(197, 160, 89, 0.4);
            background: rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center;
            color: var(--gold); font-size: 0.8rem;
        }

        .btn-ready {
            display: none;
            background: var(--gold);
            color: black;
            padding: 20px 60px;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            border: none;
            cursor: pointer;
            font-size: 1.3rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="hero-bg"></div>
<div class="overlay"></div>

<div class="wrapper">
    <header class="header">
        <h1>IL CODICE DEL SOGNO</h1>
        <p style="letter-spacing: 4px; color: var(--gold); text-shadow: 0 0 10px black;">"Dalla mia vita alla vostra"</p>
    </header>

    <div class="main-game-area">
        <p style="font-size: 1.2rem; font-style: italic; margin-bottom: 30px;">
            "Benvenuto, cercatore. Per procedere, ricomponi il messaggio che cambiò il mondo."
        </p>
        
        <div class="pool" id="pool"></div>

        <div class="slots">
            <div class="target" data-id="1">SLOT I</div>
            <div class="target" data-id="2">SLOT II</div>
            <div class="target" data-id="3">SLOT III</div>
            <div class="target" data-id="4">SLOT IV</div>
        </div>

        <div id="status" style="height: 30px; font-weight: bold; font-size: 1.2rem;"></div>
        <button class="btn-ready" id="btn-next" onclick="window.location.href='run.html'">VARCA LA SOGLIA</button>
    </div>
</div>

<script>
    const cards = [
        { id: "1", t: "Renditi umile," }, { id: "2", t: "forte e robusto:" },
        { id: "3", t: "trasformerai i lupi" }, { id: "4", t: "in agnelli." },
        { id: "x", t: "Domina con timore" }, { id: "x", t: "Sii superiore" },
        { id: "x", t: "Usa il potere" }, { id: "x", t: "Cerca la gloria" },
        { id: "x", t: "Accumula ori" }, { id: "x", t: "Vinci per te" },
        { id: "x", t: "Comanda i piccoli" }, { id: "x", t: "Punisci chi erra" }
    ];

    const pool = document.getElementById('pool');
    const btn = document.getElementById('btn-next');

    cards.sort(() => Math.random() - 0.5).forEach(c => {
        const div = document.createElement('div');
        div.className = 'fragment'; div.draggable = true; div.innerText = c.t;
        div.dataset.id = c.id;
        div.id = 'f-' + Math.random().toString(36).substr(2, 5);
        div.addEventListener('dragstart', e => e.dataTransfer.setData('text', e.target.id));
        pool.appendChild(div);
    });

    document.querySelectorAll('.target, .pool').forEach(zone => {
        zone.addEventListener('dragover', e => e.preventDefault());
        zone.addEventListener('drop', e => {
            e.preventDefault();
            const id = e.dataTransfer.getData('text');
            const el = document.getElementById(id);
            if (zone.classList.contains('target')) {
                if (zone.children.length === 0) zone.appendChild(el);
            } else {
                zone.appendChild(el);
            }
            checkSolution();
        });
    });

    function checkSolution() {
        const targets = document.querySelectorAll('.target');
        const current = Array.from(targets).map(t => t.children[0]?.dataset.id);
        if (JSON.stringify(current) === JSON.stringify(["1", "2", "3", "4"])) {
            btn.style.display = "inline-block";
            document.getElementById('status').innerText = "IL PRIMO SIGILLO È APERTO";
            document.getElementById('status').style.color = "var(--gold)";
        } else {
            btn.style.display = "none";
            document.getElementById('status').innerText = current.includes(undefined) ? "" : "L'ORDINE È ERRATO";
            document.getElementById('status').style.color = "red";
        }
    }
</script>
</body>
</html>
