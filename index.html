<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IL CODICE DEL SOGNO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Crimson+Pro:ital,wght@0,400;1,600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --parchment: #f2e6d0; }
        body, html { margin: 0; padding: 0; background-color: #050505; color: var(--parchment); font-family: 'Crimson Pro', serif; }

        /* SFONDO CHE NON COPRE IL TESTO */
        #hero-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            z-index: -2;
            background-image: url('https://leys7.github.io/DonBosco/donbosco.jpg');
            background-size: contain; background-position: center top; background-repeat: no-repeat;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0) 0%, rgba(5,5,5,0.8) 60%, #050505 100%);
            z-index: -1;
        }

        .wrapper { max-width: 900px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header { text-align: center; margin-top: 40px; margin-bottom: 380px; }
        h1 { font-family: 'Cinzel'; color: var(--gold); font-size: 3rem; text-shadow: 0 0 20px black; margin: 0; }

        /* BOX GIOCO CON TUTTO IL TESTO */
        .game-box {
            background: rgba(15, 15, 15, 0.95); border: 1px solid var(--gold);
            padding: 40px; width: 100%; box-sizing: border-box;
            box-shadow: 0 0 50px black; text-align: center;
        }

        .pool { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 25px 0; }
        .fragment { 
            background: var(--parchment); color: #111; padding: 10px 15px; 
            cursor: grab; font-weight: bold; border: 1px solid var(--gold); 
        }

        .slots { display: flex; justify-content: center; gap: 15px; margin: 30px 0; flex-wrap: wrap; }
        .target { 
            width: 180px; height: 60px; border: 1px dashed var(--gold); 
            background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center;
        }

        .btn-next {
            display: none; background: var(--gold); color: black; padding: 15px 40px;
            font-family: 'Cinzel'; font-weight: bold; border: none; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>

<div id="hero-bg"></div>
<div class="overlay"></div>

<div class="wrapper">
    <header class="header">
        <h1>IL CODICE DEL SOGNO</h1>
        <p style="color: var(--gold); letter-spacing: 2px;">"Dalla mia vita alla vostra"</p>
    </header>

    <div class="game-box">
        <h2 style="font-family: 'Cinzel'; color: var(--gold);">L'Eco del Sogno</h2>
        <p><i>"Benvenuto, cercatore. Per procedere, ricomponi il messaggio che cambiò il mondo."</i></p>
        <p>Trascina i 4 frammenti del Sogno a nove anni negli slot corretti.</p>
        
        <div class="pool" id="pool"></div>

        <div class="slots">
            <div class="target" data-id="1">SLOT I</div>
            <div class="target" data-id="2">SLOT II</div>
            <div class="target" data-id="3">SLOT III</div>
            <div class="target" data-id="4">SLOT IV</div>
        </div>

        <div id="status" style="height: 30px; font-weight: bold;"></div>
        <button class="btn-next" id="btn-next" onclick="window.location.href='run.html'">SBLOCCA DECADE I</button>
    </div>
</div>

<script>
    const cards = [
        { id: "1", t: "Renditi umile," }, { id: "2", t: "forte e robusto:" },
        { id: "3", t: "trasformerai i lupi" }, { id: "4", t: "in agnelli." },
        { id: "x", t: "Domina con timore" }, { id: "x", t: "Usa il potere" },
        { id: "x", t: "Cerca la gloria" }, { id: "x", t: "Accumula ori" },
        { id: "x", t: "Sii superiore" }, { id: "x", t: "Vinci per te" },
        { id: "x", t: "Comanda i piccoli" }, { id: "x", t: "Punisci chi erra" }
    ];

    const pool = document.getElementById('pool');
    cards.sort(() => Math.random() - 0.5).forEach(c => {
        const div = document.createElement('div');
        div.className = 'fragment'; div.draggable = true; div.innerText = c.t;
        div.dataset.id = c.id; div.id = 'f-' + Math.random();
        div.addEventListener('dragstart', e => e.dataTransfer.setData('text', e.target.id));
        pool.appendChild(div);
    });

    document.querySelectorAll('.target, .pool').forEach(zone => {
        zone.addEventListener('dragover', e => e.preventDefault());
        zone.addEventListener('drop', e => {
            e.preventDefault();
            const id = e.dataTransfer.getData('text');
            const el = document.getElementById(id);
            if (zone.classList.contains('target') && zone.children.length === 0) zone.appendChild(el);
            else if (zone.id === 'pool') zone.appendChild(el);
            check();
        });
    });

    function check() {
        const current = Array.from(document.querySelectorAll('.target')).map(t => t.children[0]?.dataset.id);
        if (JSON.stringify(current) === JSON.stringify(["1", "2", "3", "4"])) {
            document.getElementById('btn-next').style.display = "inline-block";
            document.getElementById('status').innerText = "SIGILLO APERTO";
        } else {
            document.getElementById('btn-next').style.display = "none";
            document.getElementById('status').innerText = current.includes(undefined) ? "" : "ERRORE";
        }
    }
</script>
</body>
</html>
