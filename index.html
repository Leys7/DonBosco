<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IL CODICE DEL SOGNO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Crimson+Pro:ital,wght@0,400;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --parchment: #f2e6d0;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #050505;
            color: var(--parchment);
            font-family: 'Crimson Pro', serif;
            min-height: 100vh;
        }

        /* SFONDO FISSO */
        #hero-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            z-index: -2;
            background-image: url('https://leys7.github.io/DonBosco/donbosco.jpg');
            background-size: contain; /* Mostra l'immagine intera senza tagli */
            background-position: center top;
            background-repeat: no-repeat;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, 
                rgba(0,0,0,0) 0%, 
                rgba(0,0,0,0.2) 20%, 
                rgba(5,5,5,0.8) 50%, 
                #050505 100%);
            z-index: -1;
        }

        .wrapper {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 42vh; /* Spazio per non coprire il volto */
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: clamp(2rem, 8vw, 3.5rem);
            text-shadow: 0 0 20px black;
            margin: 0;
        }

        /* BOX GIOCO SEMI-TRASPARENTE */
        .game-container {
            background: rgba(10, 10, 10, 0.85); /* Trasparenza per vedere lo sfondo */
            border: 1px solid var(--gold);
            padding: 30px;
            width: 100%;
            box-sizing: border-box;
            border-radius: 4px;
            box-shadow: 0 0 50px black;
            text-align: center;
            backdrop-filter: blur(3px);
        }

        .pool {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }

        .fragment {
            background: var(--parchment);
            color: #1a120b;
            padding: 8px 12px;
            cursor: grab;
            font-weight: bold;
            border: 1px solid var(--gold);
            font-size: 0.9rem;
        }

        .slots {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        .target {
            width: 170px; height: 55px;
            border: 1px dashed var(--gold);
            background: rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; color: var(--gold);
        }

        .btn-unlock {
            display: none;
            background: var(--gold);
            color: black;
            padding: 15px 40px;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            border: none;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div id="hero-bg"></div>
<div class="overlay"></div>

<div class="wrapper">
    <header class="header">
        <h1>IL CODICE DEL SOGNO</h1>
        <p style="color: var(--gold);">"Dalla mia vita alla vostra"</p>
    </header>

    <div class="game-container">
        <h2 style="font-family: 'Cinzel'; color: var(--gold); margin: 0;">L'Eco del Sogno</h2>
        <p>Trascina i 4 frammenti del Sogno a nove anni negli slot corretti.</p>
        
        <div class="pool" id="pool"></div>

        <div class="slots">
            <div class="target" data-idx="0">SLOT I</div>
            <div class="target" data-idx="1">SLOT II</div>
            <div class="target" data-idx="2">SLOT III</div>
            <div class="target" data-idx="3">SLOT IV</div>
        </div>

        <div id="status" style="height: 25px; font-weight: bold;"></div>
        <button class="btn-unlock" id="btn-next" onclick="window.location.href='run.html'">SBLOCCA DECADE I</button>
    </div>
</div>

<script>
    const fragments = [
        { id: "1", t: "Renditi umile," }, { id: "2", t: "forte e robusto:" },
        { id: "3", t: "trasformerai i lupi" }, { id: "4", t: "in agnelli." },
        { id: "x", t: "Usa l'autorità" }, { id: "x", t: "Domina con forza" },
        { id: "x", t: "Sii il padrone" }, { id: "x", t: "Cerca la fama" },
        { id: "x", t: "Accumula ori" }, { id: "x", t: "Comanda i piccoli" },
        { id: "x", t: "Punisci i cattivi" }, { id: "x", t: "Vinci per te" }
    ];

    const pool = document.getElementById('pool');
    const btn = document.getElementById('btn-next');

    fragments.sort(() => Math.random() - 0.5).forEach(f => {
        const div = document.createElement('div');
        div.className = 'fragment'; div.draggable = true; div.innerText = f.t;
        div.dataset.id = f.id;
        div.id = 'f-' + Math.random().toString(36).substr(2, 5);
        div.addEventListener('dragstart', e => e.dataTransfer.setData('text', e.target.id));
        pool.appendChild(div);
    });

    document.querySelectorAll('.target, .pool').forEach(zone => {
        zone.addEventListener('dragover', e => e.preventDefault());
        zone.addEventListener('drop', e => {
            e.preventDefault();
            const id = e.dataTransfer.getData('text');
            const el = document.getElementById(id);
            if (zone.classList.contains('target') && zone.children.length === 0) zone.appendChild(el);
            else if (zone.id === 'pool') zone.appendChild(el);
            check();
        });
    });

    function check() {
        const slots = document.querySelectorAll('.target');
        const current = Array.from(slots).map(s => s.children[0]?.dataset.id);
        if (JSON.stringify(current) === JSON.stringify(["1", "2", "3", "4"])) {
            btn.style.display = "inline-block";
            document.getElementById('status').innerText = "CODICE CORRETTO";
            document.getElementById('status').style.color = "var(--gold)";
        } else {
            btn.style.display = "none";
            document.getElementById('status').innerText = current.includes(undefined) ? "" : "ORDINE ERRATO";
            document.getElementById('status').style.color = "red";
        }
    }
</script>
</body>
</html>
