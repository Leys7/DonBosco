<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Corda dei Becchi - Decade I</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Crimson+Pro:ital,wght@0,400;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --parchment: #f2e6d0;
            --dark: #050505;
        }

        body {
            margin: 0;
            background: var(--dark);
            color: var(--parchment);
            font-family: 'Crimson Pro', serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Scenografia */
        .stage {
            position: relative;
            width: 100%;
            height: 60vh;
            background: linear-gradient(to bottom, #1a1a2e, #16213e);
            border-bottom: 4px solid #222;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .rope {
            position: absolute;
            width: 80%;
            height: 4px;
            background: #443c30;
            top: 70%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* Il Giovane Giovanni */
        #giovanni {
            position: absolute;
            bottom: 30%; /* Sopra la corda */
            left: 15%;
            font-size: 3rem;
            transition: left 0.5s ease, transform 0.2s;
            z-index: 10;
        }

        /* Interfaccia di Gioco */
        .ui-container {
            padding: 20px;
            text-align: center;
            width: 100%;
            max-width: 600px;
        }

        /* Barra dell'Equilibrio */
        .balance-bar {
            width: 100%;
            height: 30px;
            background: #222;
            border: 2px solid var(--gold);
            position: relative;
            margin: 20px 0;
            border-radius: 15px;
            overflow: hidden;
        }

        .target-zone {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 100%;
            background: rgba(212, 175, 55, 0.4);
            border-left: 2px solid var(--gold);
            border-right: 2px solid var(--gold);
        }

        #cursor {
            position: absolute;
            width: 6px;
            height: 100%;
            background: white;
            left: 0;
            box-shadow: 0 0 10px white;
        }

        .btn-action {
            padding: 15px 40px;
            background: var(--gold);
            border: none;
            font-family: 'Cinzel';
            font-weight: bold;
            cursor: pointer
            font-size: 1.2rem;
            border-radius: 5px;
        }

        .quote-display {
            height: 40px;
            margin-top: 10px;
            font-style: italic;
            color: var(--gold);
        }
    </style>
</head>
<body>

    <div class="stage">
        <div class="rope"></div>
        <div id="giovanni">🚶</div>
    </div>

    <div class="ui-container">
        <h2 style="font-family: 'Cinzel'; margin: 0;">MANTENERE L'EQUILIBRIO</h2>
        <p>Clicca quando il cursore bianco è nella zona dorata per avanzare.</p>
        
        <div class="balance-bar" id="bar">
            <div class="target-zone"></div>
            <div id="cursor"></div>
        </div>

        <button class="btn-action" onmousedown="attemptStep()">PASSO!</button>
        <div class="quote-display" id="quote"></div>
    </div>

<script>
    let position = 15;
    let cursorSpeed = 2;
    let cursorDir = 1;
    let cursorPos = 0;
    const giovanni = document.getElementById('giovanni');
    const cursor = document.getElementById('cursor');
    const quote = document.getElementById('quote');

    const phrases = [
        "Renditi umile...",
        "...forte e robusto...",
        "...trasformerai i lupi...",
        "...in agnelli!"
    ];
    let phraseIdx = 0;

    // Animazione cursore
    function moveCursor() {
        cursorPos += cursorSpeed * cursorDir;
        if (cursorPos >= 99 || cursorPos <= 0) cursorDir *= -1;
        cursor.style.left = cursorPos + "%";
        requestAnimationFrame(moveCursor);
    }
    moveCursor();

    function attemptStep() {
        // La "zona d'oro" è intorno al 50% (tra 45 e 55)
        if (cursorPos > 44 && cursorPos < 56) {
            advance();
        } else {
            fail();
        }
    }

    function advance() {
        position += 15;
        giovanni.style.left = position + "%";
        giovanni.style.transform = "rotate(0deg)";
        
        // Mostra frammenti della frase ogni passo
        if (phraseIdx < phrases.length) {
            quote.innerText = phrases[phraseIdx];
            phraseIdx++;
        }

        if (position >= 80) {
            quote.innerText = "CE L'HAI FATTA! LA PRIMA DECADE È TUA.";
            setTimeout(() => {
                alert("Hai completato la sfida della corda!");
                window.location.href = "decade2.html"; // Prossimo capitolo
            }, 1000);
        }
        
        // Aumenta difficoltà
        cursorSpeed += 0.5;
    }

    function fail() {
        giovanni.style.transform = "rotate(20deg)";
        quote.innerText = "Attento! Stai perdendo l'equilibrio...";
        setTimeout(() => {
            giovanni.style.transform = "rotate(0deg)";
        }, 300);
        
        // Penalità: indietreggia leggermente
        if (position > 15) position -= 5;
        giovanni.style.left = position + "%";
    }
</script>

</body>
</html>
