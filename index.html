<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IL CODICE DEL SOGNO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Crimson+Pro:ital,wght@0,400;1,600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --parchment: #f2e6d0; }
        
        body, html { 
            margin: 0; padding: 0; 
            background-color: #050505; 
            color: var(--parchment); 
            font-family: 'Crimson Pro', serif;
            min-height: 100vh;
        }

        /* SFONDO OTTIMIZZATO: POSIZIONATO PER NON COPRIRE IL VISO */
        #hero-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            z-index: -2;
            background-image: url('donbosco.jpg');
            background-size: contain; 
            background-position: center 5%; 
            background-repeat: no-repeat;
        }

        /* OVERLAY PIU' MORBIDO PER FAR EMERGERE I TESTI */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, 
                rgba(0,0,0,0) 0%, 
                rgba(0,0,0,0.2) 20%, 
                rgba(5,5,5,0.85) 60%, 
                #050505 100%);
            z-index: -1;
        }

        .wrapper { 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        
        .header { 
            text-align: center; 
            margin-top: 30px; 
            margin-bottom: 420px; /* Spazio vitale per vedere il volto di Don Bosco */
        }

        h1 { 
            font-family: 'Cinzel'; 
            color: var(--gold); 
            font-size: clamp(2rem, 8vw, 3.5rem); 
            text-shadow: 0 0 20px black; 
            margin: 0; 
        }

        /* BOX GIOCO CON CONTRASTO ELEVATO */
        .game-box {
            background: rgba(15, 15, 15, 0.95); 
            border: 1px solid var(--gold);
            padding: 35px; 
            width: 100%; 
            max-width: 800px;
            box-sizing: border-box;
            box-shadow: 0 0 50px black; 
            text-align: center;
            border-radius: 4px;
        }

        .pool { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin: 25px 0; }
        
        .fragment { 
            background: var(--parchment); 
            color: #111; 
            padding: 10px 15px; 
            cursor: grab; 
            font-weight: bold; 
            border: 1px solid var(--gold);
            font-size: 0.95rem;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.5);
        }

        .slots { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin: 30px 0; 
            flex-wrap: wrap; 
        }

        .target { 
            width: 170px; 
            height: 60px; 
            border: 1px dashed var(--gold); 
            background: rgba(0,0,0,0.5); 
            display: flex; 
            align-items: center; 
            justify-content: center;
            color: var(--gold);
            font-size: 0.8rem;
        }

        .btn-next {
            display: none; 
            background: var(--gold); 
            color: black; 
            padding: 18px 45px;
            font-family: 'Cinzel'; 
            font-weight: bold; 
            border: none; 
            cursor: pointer; 
            margin-top: 20px;
            font-size: 1.1rem;
        }

        .instruction-text {
            font-style: italic;
            margin-bottom: 20px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<div id="hero-bg"></div>
<div class="overlay"></div>

<div class="wrapper">
    <header class="header">
        <h1>IL CODICE DEL SOGNO</h1>
        <p style="color: var(--gold); letter-spacing: 2px;">"Dalla mia vita alla vostra"</p>
    </header>

    <div class="game-box">
        <h2 style="font-family: 'Cinzel'; color: var(--gold); margin-top: 0;">L'Eco del Sogno</h2>
        <div class="instruction-text">
            "Benvenuto, cercatore. Per procedere, ricomponi il messaggio che cambiò il mondo."<br>
            <strong>Trascina i 4 frammenti del Sogno a nove anni negli slot corretti.</strong>
        </div>
        
        <div class="pool" id="pool"></div>

        <div class="slots">
            <div class="target" data-id="1">SLOT I</div>
            <div class="target" data-id="2">SLOT II</div>
            <div class="target" data-id="3">SLOT III</div>
            <div class="target" data-id="4">SLOT IV</div>
        </div>

        <div id="status" style="height: 30px; font-weight: bold; color: var(--gold);"></div>
        <button class="btn-next" id="btn-next" onclick="window.location.href='run.html'">SBLOCCA DECADE I</button>
    </div>
</div>

<script>
    // Database completo a 12 schede
    const cardsData = [
        { id: "1", t: "Renditi umile," }, { id: "2", t: "forte e robusto:" },
        { id: "3", t: "trasformerai i lupi" }, { id: "4", t: "in agnelli." },
        { id: "x", t: "Domina con timore" }, { id: "x", t: "Usa il potere" },
        { id: "x", t: "Cerca la gloria" }, { id: "x", t: "Accumula ori" },
        { id: "x", t: "Sii superiore" }, { id: "x", t: "Vinci per te" },
        { id: "x", t: "Comanda i piccoli" }, { id: "x", t: "Punisci chi erra" }
    ];

    const pool = document.getElementById('pool');
    const status = document.getElementById('status');
    const btnNext = document.getElementById('btn-next');

    // Mischia e genera le 12 schede
    cardsData.sort(() => Math.random() - 0.5).forEach(c => {
        const div = document.createElement('div');
        div.className = 'fragment'; 
        div.draggable = true; 
        div.innerText = c.t;
        div.dataset.id = c.id; 
        div.id = 'f-' + Math.random().toString(36).substr(2, 9);
        div.addEventListener('dragstart', e => e.dataTransfer.setData('text', e.target.id));
        pool.appendChild(div);
    });

    // Logica Drag & Drop
    document.querySelectorAll('.target, .pool').forEach(zone => {
        zone.addEventListener('dragover', e => e.preventDefault());
        zone.addEventListener('drop', e => {
            e.preventDefault();
            const id = e.dataTransfer.getData('text');
            const el = document.getElementById(id);
            if (zone.classList.contains('target')) {
                if (zone.children.length === 0) zone.appendChild(el);
            } else {
                zone.appendChild(el);
            }
            checkResult();
        });
    });

    function checkResult() {
        const slots = document.querySelectorAll('.target');
        const currentIds = Array.from(slots).map(s => s.children[0]?.dataset.id);
        
        if (JSON.stringify(currentIds) === JSON.stringify(["1", "2", "3", "4"])) {
            status.innerText = "IL CODICE È CORRETTO";
            btnNext.style.display = "inline-block";
        } else {
            btnNext.style.display = "none";
            status.innerText = currentIds.includes(undefined) ? "" : "L'ORDINE NON È ESATTO";
        }
    }
</script>
</body>
</html>
