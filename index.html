<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Codice del Sogno - L'Eco del Sogno</title>
    <style>
        :root {
            --parchment: #f4e4bc;
            --ink: #2c1e1a;
            --gold: #d4af37;
            --mist: rgba(255, 255, 255, 0.8);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Georgia', serif;
            background-color: #1a1a1a;
            color: var(--ink);
            overflow: hidden;
        }

        /* Sfondo narrativo */
        .scena-mistica {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1524995997946-a1c2e315a42f?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Contenitore Libro/Manoscritto */
        .manoscritto {
            width: 90%;
            max-width: 800px;
            background: var(--parchment);
            padding: 40px;
            border-radius: 5px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 100px rgba(139, 69, 19, 0.2);
            position: relative;
            z-index: 10;
            text-align: center;
            border: 2px solid var(--gold);
        }

        h1 { font-style: italic; color: #5d4037; }
        p.istruzioni { font-size: 1.1rem; margin-bottom: 30px; line-height: 1.6; }

        /* Area del Gioco: Drag & Drop */
        .word-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            min-height: 100px;
            padding: 20px;
            border: 1px dashed #8b4513;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.3);
        }

        .word-card {
            background: var(--ink);
            color: var(--parchment);
            padding: 10px 20px;
            cursor: grab;
            border-radius: 4px;
            user-select: none;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
        }

        .word-card:active { cursor: grabbing; transform: scale(1.1); }

        .drop-zone {
            margin-top: 30px;
            padding: 20px;
            background: rgba(212, 175, 55, 0.1);
            border-bottom: 2px solid var(--gold);
            min-height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 1.3rem;
            font-weight: bold;
        }

        /* Effetto Nebbia */
        #fog-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--mist);
            backdrop-filter: blur(10px);
            z-index: 5;
            pointer-events: none;
            transition: opacity 2s ease;
        }

        /* Pulsante di Sblocco */
        #unlock-btn {
            margin-top: 30px;
            padding: 15px 30px;
            background: var(--gold);
            border: none;
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: none;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(212, 175, 55, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }
    </style>
</head>
<body>

<div id="fog-overlay"></div>

<div class="scena-mistica">
    <div class="manoscritto">
        <h1>L'Eco del Sogno</h1>
        <p class="istruzioni">
            "Renditi umile, forte e robusto."<br>
            Le nubi oscurano il sentiero. Trascina i frammenti del Sogno nell'ordine corretto per rivelare il cammino verso i Becchi.
        </p>

        <div class="word-container" id="source-words">
            <div class="word-card" draggable="true" id="w1" data-order="3">Lupi</div>
            <div class="word-card" draggable="true" id="w2" data-order="1">Non con le percosse</div>
            <div class="word-card" draggable="true" id="w3" data-order="2">ma con la carità</div>
            <div class="word-card" draggable="true" id="w4" data-order="4">in Agnelli</div>
        </div>

        <div class="drop-zone" id="target-zone">
            </div>

        <button id="unlock-btn" onclick="procediAlLivello1()">Apri il Primo Lucchetto</button>
    </div>
</div>

<script>
    const cards = document.querySelectorAll('.word-card');
    const targetZone = document.getElementById('target-zone');
    const sourceZone = document.getElementById('source-words');
    const fog = document.getElementById('fog-overlay');
    const btn = document.getElementById('unlock-btn');

    // Ordine corretto delle frasi
    const correctOrder = ["1", "2", "3", "4"];
    let currentSequence = [];

    cards.forEach(card => {
        card.addEventListener('dragstart', e => {
            e.dataTransfer.setData('text/plain', card.id);
        });
    });

    targetZone.addEventListener('dragover', e => e.preventDefault());

    targetZone.addEventListener('drop', e => {
        e.preventDefault();
        const id = e.dataTransfer.getData('text/plain');
        const element = document.getElementById(id);
        targetZone.appendChild(element);
        checkSequence();
    });

    // Permette di riportare le parole indietro se si sbaglia
    sourceZone.addEventListener('dragover', e => e.preventDefault());
    sourceZone.addEventListener('drop', e => {
        e.preventDefault();
        const id = e.dataTransfer.getData('text/plain');
        sourceZone.appendChild(document.getElementById(id));
        checkSequence();
    });

    function checkSequence() {
        const currentCards = Array.from(targetZone.children);
        currentSequence = currentCards.map(c => c.dataset.order);

        // Se l'ordine è corretto e sono tutte e 4
        if (JSON.stringify(currentSequence) === JSON.stringify(correctOrder)) {
            dissipaNebbia();
        }
    }

    function dissipaNebbia() {
        fog.style.opacity = '0';
        btn.style.display = 'inline-block';
        document.querySelector('.istruzioni').innerHTML = "<strong>La visione è chiara.</strong> Il Codice ha reagito al tuo tocco. Il sentiero per i Becchi è ora visibile.";
    }

    function procediAlLivello1() {
        alert("Transizione alla Prima Decade: La Nascita (1815-1835)...");
        // Qui inseriremo il link alla pagina successiva o il caricamento dinamico del Livello 1
    }
</script>

</body>
</html>
