<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IL CODICE DEL SOGNO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Crimson+Pro:ital,wght@0,400;1,600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --parchment: #f2e6d0;
            --dark-overlay: rgba(10, 10, 10, 0.85);
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #050505;
            color: var(--parchment);
            font-family: 'Crimson Pro', serif;
            height: 100%;
        }

        /* SFONDO OTTIMIZZATO */
        #hero-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            z-index: -2;
            background-image: url('https://leys7.github.io/DonBosco/donbosco.jpg');
            background-size: contain; /* Assicura che l'immagine intera sia visibile */
            background-position: center top;
            background-repeat: no-repeat;
            background-color: #050505;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0) 20%, rgba(5,5,5,0.9) 90%);
            z-index: -1;
        }

        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        .header {
            text-align: center;
            margin-top: 30px;
            margin-bottom: 350px; /* Spazio preciso per il volto di Don Bosco */
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: clamp(2rem, 8vw, 3.5rem);
            margin: 0;
            text-shadow: 0 0 20px black;
        }

        /* PANNELLO DI GIOCO COMPATTO */
        .main-panel {
            background: var(--dark-overlay);
            border: 1px solid var(--gold);
            padding: 30px;
            max-width: 900px;
            width: 95%;
            border-radius: 4px;
            box-shadow: 0 0 50px rgba(0,0,0,1);
            backdrop-filter: blur(5px);
            text-align: center;
        }

        .pool {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }

        .fragment {
            background: var(--parchment);
            color: #1a120b;
            padding: 8px 14px;
            cursor: grab;
            font-weight: bold;
            border: 1px solid var(--gold);
            font-size: 0.9rem;
            transition: transform 0.2s;
        }

        .fragment:hover { transform: scale(1.05); }

        .slots {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 25px 0;
            flex-wrap: wrap;
        }

        .target {
            width: 160px; height: 55px;
            border: 1px dashed var(--gold);
            background: rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
            color: var(--gold); font-size: 0.7rem;
            text-transform: uppercase;
        }

        .btn-unlock {
            display: none;
            background: var(--gold);
            color: black;
            padding: 15px 40px;
            font-family: 'Cinzel', serif;
            font-weight: bold;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            margin-top: 15px;
        }

        p.description { font-style: italic; margin-bottom: 20px; opacity: 0.9; }
    </style>
</head>
<body>

<div id="hero-bg"></div>
<div class="overlay"></div>

<div class="wrapper">
    <header class="header">
        <h1>IL CODICE DEL SOGNO</h1>
        <p style="color: var(--gold); letter-spacing: 2px;">"Dalla mia vita alla vostra"</p>
    </header>

    <div class="main-panel">
        <h2 style="font-family: 'Cinzel'; color: var(--gold); margin-top: 0;">L'Eco del Sogno</h2>
        <p class="description">Trascina i 4 frammenti del "Sogno a nove anni" negli slot corretti.</p>
        
        <div class="pool" id="pool"></div>

        <div class="slots">
            <div class="target" data-idx="0">Slot I</div>
            <div class="target" data-idx="1">Slot II</div>
            <div class="target" data-idx="2">Slot III</div>
            <div class="target" data-idx="3">Slot IV</div>
        </div>

        <div id="status" style="height: 25px; color: var(--gold); font-weight: bold;"></div>
        <button class="btn-unlock" id="btn-next" onclick="window.location.href='run.html'">SBLOCCA DECADE I</button>
    </div>
</div>

<script>
    // Database delle 12 schede
    const data = [
        { id: "1", text: "Renditi umile," }, { id: "2", text: "forte e robusto:" },
        { id: "3", text: "trasformerai i lupi" }, { id: "4", text: "in agnelli." },
        { id: "x", text: "Usa l'autorità" }, { id: "x", text: "Domina con forza" },
        { id: "x", text: "Sii il padrone" }, { id: "x", text: "Cerca la fama" },
        { id: "x", text: "Accumula ori" }, { id: "x", text: "Comanda i piccoli" },
        { id: "x", text: "Punisci i cattivi" }, { id: "x", text: "Vinci per te" }
    ];

    const pool = document.getElementById('pool');
    const status = document.getElementById('status');
    const btn = document.getElementById('btn-next');

    // Mischia e crea frammenti
    data.sort(() => Math.random() - 0.5).forEach(item => {
        const div = document.createElement('div');
        div.className = 'fragment';
        div.draggable = true;
        div.innerText = item.text;
        div.dataset.id = item.id;
        div.id = 'f-' + Math.random().toString(36).substr(2, 5);
        div.addEventListener('dragstart', e => e.dataTransfer.setData('text', e.target.id));
        pool.appendChild(div);
    });

    // Gestione Drop
    document.querySelectorAll('.target, .pool').forEach(zone => {
        zone.addEventListener('dragover', e => e.preventDefault());
        zone.addEventListener('drop', e => {
            e.preventDefault();
            const id = e.dataTransfer.getData('text');
            const el = document.getElementById(id);
            if (zone.classList.contains('target')) {
                if (zone.children.length === 0) zone.appendChild(el);
            } else {
                zone.appendChild(el);
            }
            check();
        });
    });

    function check() {
        const slots = document.querySelectorAll('.target');
        const current = Array.from(slots).map(s => s.children[0]?.dataset.id);
        if (JSON.stringify(current) === JSON.stringify(["1", "2", "3", "4"])) {
            status.innerText = "IL CODICE È CORRETTO";
            btn.style.display = "inline-block";
        } else {
            btn.style.display = "none";
            status.innerText = current.includes(undefined) ? "" : "L'ORDINE NON È ESATTO";
        }
    }
</script>
</body>
</html>
