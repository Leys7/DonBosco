<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Saltimbanco di Dio - Becchi</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Crimson+Pro:ital,wght@0,400;1,600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --parchment: #f2e6d0; --sky: #1e293b; --danger: #ef4444; }
        body { margin: 0; background: var(--sky); color: var(--parchment); font-family: 'Crimson Pro', serif; }
        
        .hero { height: 300px; background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://leys7.github.io/DonBosco/donbosco.jpg'); background-size: cover; display: flex; align-items: center; justify-content: center; border-bottom: 2px solid var(--gold); }
        h1 { font-family: 'Cinzel', serif; color: var(--gold); text-align: center; }

        .container { max-width: 800px; margin: 20px auto; padding: 30px; background: #0f172a; border: 1px solid #333; }

        /* Area di Gioco Visiva */
        .stage { position: relative; height: 200px; background: rgba(0,0,0,0.4); border-radius: 15px; margin: 30px 0; overflow: hidden; border: 1px solid #444; }
        .rope { position: absolute; top: 75%; width: 100%; height: 3px; background: #5d4037; }
        
        #sprite { 
            position: absolute; left: 5%; bottom: 20%; width: 80px; height: 80px;
            background: url('https://raw.githubusercontent.com/leys7/DonBosco/main/image_c874f2.jpg'); /* Assicurati che l'URL sia corretto nella tua repo */
            background-size: contain; background-repeat: no-repeat;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Quiz Box */
        .quiz-container { background: #1e293b; padding: 25px; border-radius: 10px; border-left: 5px solid var(--gold); }
        .question { font-size: 1.3rem; margin-bottom: 20px; color: var(--gold); font-weight: bold; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        
        .opt-btn { 
            padding: 15px; background: #334155; border: 1px solid #475569; color: white; 
            text-align: left; cursor: pointer; border-radius: 5px; transition: 0.3s;
        }
        .opt-btn:hover { background: #475569; border-color: var(--gold); }

        #msg { margin-top: 20px; font-weight: bold; text-align: center; min-height: 24px; }
        .win-btn { display: none; margin: 30px auto; padding: 20px 50px; background: var(--gold); border: none; font-family: 'Cinzel'; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="hero">
    <h1>IL SALTIMBANCO DI DIO</h1>
</div>

<div class="container">
    <p>Giovanni è sulla corda. Sotto di lui, decine di ragazzi aspettano col fiato sospeso. Ogni passo è una scelta: se cede alla tentazione del successo personale, la corda trema. Se mette Dio al centro, il suo passo è fermo.</p>

    <div class="stage">
        <div class="rope"></div>
        <div id="sprite"></div>
    </div>

    <div class="quiz-container" id="quiz-box">
        <div class="question" id="q-text">Caricamento sfida...</div>
        <div class="options" id="q-options"></div>
    </div>

    <div id="msg"></div>
    <button id="win-btn" class="win-btn" onclick="window.location.href='decade2.html'">PROSEGUI IL CAMMINO →</button>
</div>

<script>
    const questions = [
        {
            text: "La folla grida il tuo nome. Un ragazzo ti sfida a fare un salto mortale pericoloso solo per spettacolo. Cosa fai?",
            options: [
                { text: "Accetto la sfida per dimostrare di essere il migliore.", correct: false, feedback: "Giovanni cade! La superbia rende il passo pesante." },
                { text: "Sorrido e propongo invece di recitare insieme il Rosario prima del gran finale.", correct: true, feedback: "Ottimo! L'umiltà è la tua forza." }
            ]
        },
        {
            text: "Un signore ricco ti offre delle monete d'oro per esibirti solo nel suo giardino privato. Come rispondi?",
            options: [
                { text: "Rifiuto: il mio talento è per i miei amici poveri, non per i soldi.", correct: true, feedback: "Il cuore libero ti permette di volare sulla corda!" },
                { text: "Accetto: con quei soldi potrei comprare vestiti nuovi e vantarmi.", correct: false, feedback: "L'avidità ti sbilancia. Giovanni deve ricominciare." }
            ]
        },
        {
            text: "Durante l'esibizione, alcuni bulli iniziano a ridere di te. Qual è la tua reazione?",
            options: [
                { text: "Mi fermo e rispondo con rabbia per difendere il mio onore.", correct: false, feedback: "L'ira spezza l'armonia. Sei caduto!" },
                { text: "Continuo con mansuetudine, dedicando a loro il prossimo trucco.", correct: true, feedback: "La pazienza conquista ogni cuore. Sei quasi alla meta!" }
            ]
        }
    ];

    let currentQ = 0;
    const sprite = document.getElementById('sprite');
    const qText = document.getElementById('q-text');
    const qOptions = document.getElementById('q-options');
    const msg = document.getElementById('msg');
    const winBtn = document.getElementById('win-btn');

    function loadQuestion() {
        const q = questions[currentQ];
        qText.innerText = q.text;
        qOptions.innerHTML = "";
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = "opt-btn";
            btn.innerText = opt.text;
            btn.onclick = () => handleAnswer(opt);
            qOptions.appendChild(btn);
        });
    }

    function handleAnswer(opt) {
        if (opt.correct) {
            currentQ++;
            sprite.style.left = (currentQ * 30 + 5) + "%";
            msg.innerText = opt.feedback;
            msg.style.color = "var(--gold)";
            
            if (currentQ >= questions.length) {
                sprite.style.left = "85%";
                document.getElementById('quiz-box').style.display = "none";
                msg.innerText = "CE L'HAI FATTA! Giovanni ha portato tutti i ragazzi a pregare.";
                winBtn.style.display = "block";
            } else {
                setTimeout(loadQuestion, 1500);
            }
        } else {
            currentQ = 0;
            sprite.style.left = "5%";
            msg.innerText = opt.feedback;
            msg.style.color = "var(--danger)";
            setTimeout(loadQuestion, 2000);
        }
    }

    loadQuestion();
</script>
</body>
</html>
