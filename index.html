<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IL CODICE DEL SOGNO</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Crimson+Pro:ital,wght@0,400;1,600&display=swap" rel="stylesheet">
<style>
    :root {
        --gold: #c5a059;
        --parchment: #f2e6d0;
    }

    body, html {
        margin: 0;
        padding: 0;
        background-color: #050505;
        color: var(--parchment);
        font-family: 'Crimson Pro', serif;
        min-height: 100vh;
        overflow-x: hidden;
    }

    /* SFONDO FISSO CHE NON SI MUOVE */
    #hero-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        z-index: -2;
        /* Questo assicura che l'immagine copra tutto senza distorcersi */
        background-image: url('https://leys7.github.io/DonBosco/donbosco.jpg');
        background-size: cover; 
        background-position: center 20%; /* Inquadra meglio il volto */
        background-repeat: no-repeat;
    }

    /* SFUMATURA PER RENDERE IL TESTO LEGGIBILE */
    .overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        /* Crea un gradiente che scurisce verso il basso dove c'è il gioco */
        background: linear-gradient(to bottom, 
            rgba(0,0,0,0.2) 0%, 
            rgba(0,0,0,0.5) 40%, 
            rgba(5,5,5,0.9) 80%, 
            #050505 100%);
        z-index: -1;
    }

    .wrapper {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    .header {
        margin-top: 5vh;
        margin-bottom: 40vh; /* Spazio per vedere Don Bosco */
        text-align: center;
    }

    h1 {
        font-family: 'Cinzel', serif;
        color: var(--gold);
        font-size: clamp(2rem, 10vw, 3.5rem);
        text-shadow: 0 0 20px black;
        margin: 0;
    }

    /* CONTENITORE DEL GIOCO */
    .box {
        background: rgba(15, 15, 15, 0.95);
        border: 1px solid var(--gold);
        padding: 30px;
        border-radius: 8px;
        box-shadow: 0 0 50px black;
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 50px;
    }
    
    /* Regole per le schede (Fragments) */
    .pool { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin: 20px 0; }
    .item { 
        background: var(--parchment); 
        color: #1a120b; 
        padding: 10px; 
        cursor: grab; 
        font-weight: bold; 
        border: 1px solid var(--gold);
    }
    .slots { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
    .target { 
        width: 160px; height: 50px; 
        border: 1px dashed var(--gold); 
        background: rgba(255,255,255,0.05);
    }
</style>
</head>
<body>

    <div id="hero-bg"></div>
    <div class="overlay"></div>

    <div class="wrapper">
        <div class="header">
            <h1>IL CODICE DEL SOGNO</h1>
            <p style="color:#c5a059; letter-spacing: 2px;"><i>"Dalla mia vita alla vostra"</i></p>
        </div>

        <div class="box">
            <h2 style="font-family:'Cinzel'; color:#c5a059;">L'Eco del Sogno</h2>
            <p>Trascina i frammenti del <i>Sogno a nove anni</i> per sbloccare la Decade I.</p>
            <div class="pool" id="pool"></div>
            <div class="slots">
                <div class="target" data-idx="1">SLOT I</div>
                <div class="target" data-idx="2">SLOT II</div>
                <div class="target" data-idx="3">SLOT III</div>
                <div class="target" data-idx="4">SLOT IV</div>
            </div>
            <div id="status" style="height:25px; margin:10px 0;"></div>
            <button id="next" class="btn" onclick="window.location.href='run.html'">VARCA LA SOGLIA</button>
        </div>
    </div>

    <script>
        // FORZATURA IMMAGINE VIA JS
        window.onload = function() {
            const bg = document.getElementById('hero-bg');
            // Usiamo il link che hai confermato funzionare nel browser
            const imgUrl = "https://leys7.github.io/DonBosco/donbosco.jpg";
            bg.style.backgroundImage = "url('" + imgUrl + "')";
        };

        const fragments = [
            { id: "1", t: "Renditi umile," }, { id: "2", t: "forte e robusto:" },
            { id: "3", t: "trasformerai i lupi" }, { id: "4", t: "in agnelli." },
            { id: "x", t: "Cerca la fama" }, { id: "x", t: "Usa l'autorità" },
            { id: "x", t: "Sii il padrone" }, { id: "x", t: "Accumula ori" }
        ];

        const pool = document.getElementById('pool');
        const state = [null, null, null, null];

        fragments.sort(() => Math.random() - 0.5).forEach(f => {
            const div = document.createElement('div');
            div.className = 'item'; div.draggable = true; div.innerText = f.t; div.id = 'f' + Math.random().toString(36).substr(2, 5);
            div.dataset.val = f.id;
            div.addEventListener('dragstart', e => e.dataTransfer.setData('text', e.target.id));
            pool.appendChild(div);
        });

        document.querySelectorAll('.target, .pool').forEach(zone => {
            zone.addEventListener('dragover', e => e.preventDefault());
            zone.addEventListener('drop', e => {
                e.preventDefault();
                const id = e.dataTransfer.getData('text');
                const el = document.getElementById(id);
                zone.appendChild(el);
                check();
            });
        });

        function check() {
            const slots = document.querySelectorAll('.target');
            const current = Array.from(slots).map(s => s.children[0]?.dataset.val);
            if (JSON.stringify(current) === JSON.stringify(["1", "2", "3", "4"])) {
                document.getElementById('next').style.display = 'inline-block';
                document.getElementById('status').innerText = "IL PRIMO LUCCHETTO SI È APERTO";
                document.getElementById('status').style.color = "#c5a059";
            } else {
                document.getElementById('next').style.display = 'none';
                document.getElementById('status').innerText = current.includes(undefined) ? "" : "ORDINE ERRATO";
                document.getElementById('status').style.color = "red";
            }
        }
    </script>
</body>
</html>
