<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valdocco Strategist</title>
    <style>
        :root { --danger: #ff4757; --success: #2ed573; --info: #1e90ff; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #fff; margin: 0; text-align: center; }
        .stat-bar { display: flex; justify-content: space-around; background: #16213e; padding: 15px; position: sticky; top: 0; border-bottom: 3px solid #0f3460; }
        .stat { font-size: 0.9rem; font-weight: bold; }
        .val { display: block; font-size: 1.4rem; color: var(--info); }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 20px; max-width: 450px; margin: 0 auto; }
        .plot { aspect-ratio: 1; background: #0f3460; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid transparent; transition: 0.2s; font-size: 0.8rem; }
        .plot:hover { border-color: #e94560; }
        .plot.active { border-color: #fff; background: #16213e; }
        .plot.built { background: #fff; color: #1a1a2e; font-weight: bold; border: none; }
        .actions { padding: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 450px; margin: 0 auto; }
        button { padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.8rem; background: #0f3460; color: white; }
        button:hover { background: #533483; }
        .log { font-size: 0.85rem; padding: 15px; color: #aaa; font-style: italic; min-height: 40px; }
        #over { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index:1000; flex-direction:column; justify-content:center; align-items:center; }
    </style>
</head>
<body>
    <div id="over">
        <h1 id="over-title">GAME OVER</h1>
        <p id="over-msg"></p>
        <button onclick="location.reload()" style="background:var(--success)">RIPROVA STRATEGIA</button>
    </div>

    <div class="stat-bar">
        <div class="stat">💰 SOLDI<span id="s-money" class="val">100</span></div>
        <div class="stat">😊 FELICITÀ<span id="s-happy" class="val">50</span></div>
        <div class="stat">📚 STUDIO<span id="s-edu" class="val">0 / 100</span></div>
    </div>

    <p class="log" id="game-log">Benvenuto a Valdocco. Seleziona un terreno per iniziare.</p>

    <div class="grid" id="main-grid"></div>
    <div class="actions">
        <button onclick="play('laboratorio')">🛠️ LABORATORIO<br>(-40💰, +15📚, -10😊)</button>
        <button onclick="play('oratorio')">⚽ ORATORIO<br>(-30💰, +20😊, -5📚)</button>
        <button onclick="play('lavoro')">💼 LAVORO ESTERNO<br>(+50💰, -20😊)</button>
        <button onclick="play('preghiera')">🙏 RIFLESSIONE<br>(+10😊, +5📚)</button>
    </div>

    <script>
        let money = 100, happy = 50, edu = 0, selected = -1;
        const grid = document.getElementById('main-grid');
        const log = document.getElementById('game-log');

        // Crea Griglia
        for(let i=0; i<9; i++) {
            let p = document.createElement('div');
            p.className = 'plot'; p.innerText = "LIBERO";
            p.onclick = () => {
                document.querySelectorAll('.plot').forEach(x => x.classList.remove('active'));
                p.classList.add('active'); selected = i;
            };
            grid.appendChild(p);
        }

        function play(action) {
            const plots = document.querySelectorAll('.plot');
            
            if (action === 'lavoro') {
                money += 50; happy -= 20;
                log.innerText = "I ragazzi hanno lavorato sodo. Soldi incassati, ma sono stanchi.";
            } else if (action === 'preghiera') {
                happy += 10; edu += 5;
                log.innerText = "Un momento di pace rigenera lo spirito e la mente.";
            } else {
                if (selected === -1 || plots[selected].classList.contains('built')) {
                    alert("Seleziona un terreno libero!"); return;
                }
                if (action === 'laboratorio') {
                    if (money < 40) { log.innerText = "Soldi insufficienti!"; return; }
                    money -= 40; edu += 15; happy -= 10;
                    plots[selected].innerHTML = "🛠️<br>LAB";
                } else if (action === 'oratorio') {
                    if (money < 30) { log.innerText = "Soldi insufficienti!"; return; }
                    money -= 30; happy += 20; edu -= 5;
                    plots[selected].innerHTML = "⚽<br>ORA";
                }
                plots[selected].classList.add('built');
                selected = -1;
            }
            update();
        }

        function update() {
            document.getElementById('s-money').innerText = money;
            document.getElementById('s-happy').innerText = happy;
            document.getElementById('s-edu').innerText = edu + " / 100";

            if (happy <= 0) endGame("I ragazzi hanno abbandonato l'oratorio. Troppa fatica e poca gioia.");
            if (money < 0) endGame("Sei andato in bancarotta. I creditori hanno chiuso Valdocco.");
            if (edu >= 100) endGame("VITTORIA! Hai creato un sistema perfetto di formazione e gioia.", true);
        }

        function endGame(m, win = false) {
            const screen = document.getElementById('over');
            screen.style.display = 'flex';
            document.getElementById('over-title').innerText = win ? "MISSIONE COMPIUTA" : "FALLIMENTO";
            document.getElementById('over-title').style.color = win ? "var(--success)" : "var(--danger)";
            document.getElementById('over-msg').innerText = m;
        }
    </script>
</body>
</html>
