<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Il Cammino del Discernimento</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Crimson+Pro:ital,wght@0,400;1,600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #d4af37; --parchment: #f2e6d0; --dark: #050505; }
        body { margin: 0; background: var(--dark); color: var(--parchment); font-family: 'Crimson Pro', serif; text-align: center; }
        
        .rope-scene {
            height: 40vh;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            background: linear-gradient(to bottom, #0a0a0a, #151515);
            position: relative;
            border-bottom: 2px solid var(--gold);
        }

        #giovanni { font-size: 3rem; position: absolute; bottom: 10px; left: 10%; transition: all 1s ease; }
        .rope-line { position: absolute; bottom: 0; width: 100%; height: 2px; background: var(--gold); opacity: 0.3; }

        .challenge-container { padding: 40px; max-width: 800px; margin: 0 auto; }
        
        .choice-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .choice-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            padding: 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .choice-card:hover { border-color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        
        .narrative { font-style: italic; font-size: 1.2rem; min-height: 80px; }
    </style>
</head>
<body>

<div class="rope-scene">
    <div class="rope-line"></div>
    <div id="giovanni">🚶</div>
</div>

<div class="challenge-container">
    <h2 style="font-family: 'Cinzel'; color: var(--gold);">IL BIVIO INTERIORE</h2>
    <div class="narrative" id="story-text">
        I compagni ti chiedono di saltare sulla corda, ma alcuni ti deridono. Come reagisci per portarli a Dio?
    </div>

    <div class="choice-box" id="choices">
        </div>

    <div id="feedback" style="margin-top: 20px; font-weight: bold; height: 30px;"></div>
</div>

<script>
    const levels = [
        {
            q: "Alcuni ragazzi usano parole volgari nel cortile. Cosa fai?",
            options: [
                { t: "Li rimproveri con durezza per mostrare autorità", correct: false, reason: "Il timore allontana il cuore." },
                { t: "Ti rendi umile e conquisti la loro amicizia", correct: true, reason: "Renditi umile: questa è la chiave del sogno." }
            ]
        },
        {
            q: "La fatica di studiare e lavorare è molta. Dove trovi la forza?",
            options: [
                { t: "Confidi solo nelle tue capacità umane", correct: false, reason: "Senza la guida dell'Alto, la corda si spezza." },
                { t: "Ti rendi forte e robusto nella preghiera", correct: true, reason: "La forza viene dalla missione, non dal muscolo." }
            ]
        },
        {
            q: "Incontri un ragazzo ribelle che tutti chiamano 'lupo'.",
            options: [
                { t: "Cerchi di trasformarlo con la pazienza e l'amore", correct: true, reason: "Ecco come i lupi diventano agnelli." },
                { t: "Lo allontani per proteggere gli altri", correct: false, reason: "Nessun lupo è perduto se lo accoglie un pastore." }
            ]
        }
    ];

    let currentLevel = 0;
    let pos = 10;
    const giovanni = document.getElementById('giovanni');
    const storyText = document.getElementById('story-text');
    const choiceBox = document.getElementById('choices');
    const feedback = document.getElementById('feedback');

    function loadLevel() {
        if (currentLevel >= levels.length) {
            winGame();
            return;
        }
        
        const lvl = levels[currentLevel];
        storyText.innerText = lvl.q;
        choiceBox.innerHTML = "";
        feedback.innerText = "";

        lvl.options.forEach(opt => {
            const div = document.createElement('div');
            div.className = "choice-card";
            div.innerText = opt.t;
            div.onclick = () => handleChoice(opt);
            choiceBox.appendChild(div);
        });
    }

    function handleChoice(opt) {
        if (opt.correct) {
            feedback.style.color = "var(--gold)";
            feedback.innerText = "GIUSTO: " + opt.reason;
            pos += 25;
            giovanni.style.left = pos + "%";
            currentLevel++;
            setTimeout(loadLevel, 2500);
        } else {
            feedback.style.color = "#ff4444";
            feedback.innerText = "SBAGLIATO: " + opt.reason;
            giovanni.style.transform = "translateX(-10px)";
            setTimeout(() => giovanni.style.transform = "translateX(0)", 200);
        }
    }

    function winGame() {
        storyText.innerText = "Hai attraversato la Decade con la sapienza del cuore.";
        choiceBox.innerHTML = "<button onclick='window.location.href=\"decade2.html\"' style='padding:15px 30px; background:var(--gold); border:none; cursor:pointer; font-family:Cinzel; font-weight:bold;'>ENTRA NELLA SECONDA DECADE</button>";
    }

    loadLevel();
</script>
</body>
</html>
