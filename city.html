<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valdocco Manager - CNOS-FAP</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="header">
    <div class="stat">💰 RISORSE<span id="res" class="stat-val">100</span></div>
    <div class="stat">✨ SPERANZA<span id="hope" class="stat-val">0</span></div>
    <div class="stat">👨‍🎓 RAGAZZI<span id="kids" class="stat-val">0</span></div>
</div>

<div id="city-grid">
    <div class="plot" onclick="selectPlot(0)">Terreno Libero</div>
    <div class="plot" onclick="selectPlot(1)">Terreno Libero</div>
    <div class="plot" onclick="selectPlot(2)">Terreno Libero</div>
    <div class="plot" onclick="selectPlot(3)">Terreno Libero</div>
    <div class="plot" onclick="selectPlot(4)">Terreno Libero</div>
    <div class="plot" onclick="selectPlot(5)">Terreno Libero</div>
    <div class="plot" onclick="selectPlot(6)">Terreno Libero</div>
    <div class="plot" onclick="selectPlot(7)">Terreno Libero</div>
    <div class="plot" onclick="selectPlot(8)">Terreno Libero</div>
</div>

<div id="controls">
    <span class="menu-title">Cosa vuoi costruire?</span>
    <button class="build-btn" onclick="build('lab')">🛠️ Laboratorio (-30 Risorse)</button>
    <button class="build-btn" onclick="build('ora')">⚽ Oratorio (-20 Risorse)</button>
    <button class="build-btn" onclick="build('dorm')">🛏️ Alloggi (-40 Risorse)</button>
</div>

<div id="win-modal" class="modal">
    <h2>Valdocco è fiorita! 🏰</h2>
    <p>Hai creato una comunità incredibile.</p>
    <button onclick="location.reload()">Ricomincia</button>
</div>

<script src="script.js"></script>
</body>
</html>
